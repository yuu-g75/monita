<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心電図判読トレーニング</title>
<style>
    :root {
        --bg-color: #121212;
        --panel-bg: #1e1e1e;
        --monitor-bg: #001100;
        --primary-color: #4CAF50;
        --danger-color: #f44336;
        --text-color: #ffffff;
        --border-color: #333333;
    }

    body {
        font-family: 'Helvetica Neue', Arial, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    #app {
        width: 100%;
        max-width: 600px;
        background: var(--panel-bg);
        box-shadow: 0 8px 30px rgba(0,0,0,0.6);
        border-radius: 12px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        min-height: 85vh;
        position: relative;
    }

    .screen {
        display: none; /* 初期状態は非表示 */
        padding: 25px;
        flex-grow: 1;
        flex-direction: column;
        justify-content: center;
    }

    .screen.active {
        display: flex; /* activeクラスがつくと表示される */
    }

    h1, h2, h3 {
        color: var(--primary-color);
        text-align: center;
        margin-top: 0;
    }

    /* モニター画面のデザイン */
    #monitor-wrapper {
        width: 100%;
        height: 220px;
        background: var(--monitor-bg);
        border: 3px solid var(--border-color);
        position: relative;
        border-radius: 8px;
        margin-bottom: 25px;
        overflow: hidden;
    }

    /* 背景のグリッド線 */
    #monitor-wrapper::after {
        content: "";
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background-image: 
            linear-gradient(rgba(0,255,0,0.15) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0,255,0,0.15) 1px, transparent 1px);
        background-size: 25px 25px;
        z-index: 1;
        pointer-events: none;
    }

    canvas {
        position: absolute;
        top: 0;
        left: 0;
        z-index: 2;
    }

    /* ボタン群 */
    .btn-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 20px;
    }

    button {
        background: #2c2c2c;
        color: #fff;
        border: 2px solid var(--border-color);
        padding: 16px;
        font-size: 15px;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    button:hover {
        background: #3a3a3a;
    }

    button.selected {
        background: rgba(76, 175, 80, 0.2);
        border-color: var(--primary-color);
        color: var(--primary-color);
        font-weight: bold;
    }

    button.primary {
        background: var(--primary-color);
        color: #121212;
        border: none;
        font-size: 18px;
        font-weight: bold;
        padding: 18px;
        margin-top: auto;
    }

    button.primary:hover {
        background: #45a049;
    }

    button:disabled {
        background: #333;
        color: #666;
        cursor: not-allowed;
    }

    /* 解説ボックス */
    .info-box {
        background: #252525;
        border-left: 5px solid var(--primary-color);
        padding: 16px;
        margin-bottom: 16px;
        border-radius: 0 6px 6px 0;
    }

    .info-box.danger {
        border-left-color: var(--danger-color);
    }

    .info-label {
        font-size: 12px;
        color: #aaa;
        margin-bottom: 6px;
        font-weight: bold;
    }

    .info-text {
        font-size: 16px;
        line-height: 1.6;
        margin: 0;
    }

    .result-title {
        font-size: 36px;
        text-align: center;
        margin: 20px 0 40px 0;
        font-weight: bold;
    }
    
    .correct { color: var(--primary-color); }
    .incorrect { color: var(--danger-color); }

</style>
</head>
<body>

<div id="app">
    <div id="start-screen" class="screen active">
        <h1>心電図トレーニング</h1>
        <p style="text-align:center; color:#ccc; margin-bottom: 40px; line-height:1.6;">
            動く波形を見て、正しい心電図の種類を選択してください。<br>
            ※「すぐ引けるモニター心電図」に基づく出題です。
        </p>
        <button class="primary" onclick="startTraining()">訓練を開始する</button>
    </div>

    <div id="quiz-screen" class="screen">
        <div id="monitor-wrapper">
            <canvas id="ecg-canvas"></canvas>
        </div>
        <div class="btn-grid" id="choices-container">
            </div>
        <button id="btn-next-result" class="primary" onclick="goToResult()" disabled>次へ進む</button>
    </div>

    <div id="result-screen" class="screen">
        <div id="result-text" class="result-title"></div>
        <button class="primary" onclick="goToExplanation()">次へ（解説を見る）</button>
    </div>

    <div id="explanation-screen" class="screen">
        <h2 id="exp-title" style="margin-bottom: 20px;"></h2>
        
        <div class="info-box danger">
            <div class="info-label">🚨 緊急度・必要な処置</div>
            <p class="info-text" id="exp-action"></p>
        </div>

        <div class="info-box">
            <div class="info-label">📖 波形の詳細・特徴</div>
            <p class="info-text" id="exp-desc"></p>
        </div>

        <button class="primary" onclick="nextQuestion()" style="margin-top: 30px;">次の問題へ</button>
    </div>
</div>

<script>
// 問題データ
const ecgData = [
    { id: 'nsr', name: '正常洞調律', urgency: 'なし', action: '特になし', description: '洞結節で発生した規則正しい興奮が伝わる状態です。P波、QRS波、T波が一定のリズムで規則正しくあらわれます。' },
    { id: 'vf', name: '心室細動 (VF)', urgency: '高', action: 'ドクターコール・胸骨圧迫・早急な除細動', description: '心室筋が無秩序に興奮し、心拍出量はゼロとなる極めて危険な状態です。波形の大きさや形が一定しません。' },
    { id: 'vt', name: '心室頻拍 (VT)', urgency: '高', action: 'ドクターコール・胸骨圧迫・意識確認', description: '幅広いQRS波が連続します。血圧が低下し、ショック状態や突然死にいたる危険があります。' },
    { id: 'af', name: '心房細動 (AF)', urgency: '中', action: '12誘導心電図・症状の有無をチェック', description: 'P波が消失し、f波があらわれ、RR間隔が全く一定しない(絶対不整脈)のが特徴です。' },
    { id: 'pvc', name: '心室性期外収縮 (PVC)', urgency: '低〜中', action: 'バイタルチェック・症状の確認', description: '先行するP波を伴わない幅広いQRS波があらわれ、T波は逆向きになります。連発には注意が必要です。' }
];

let currentQuestion = null;
let selectedAnswer = null;

// キャンバスとアニメーションの設定
const canvas = document.getElementById('ecg-canvas');
const ctx = canvas.getContext('2d');
let animationId;
let ecgTime = 0;
let ecgX = 0;
let lastY = 0;
let ecgState = {};

// ★修正点: キャンバスサイズの取得を確実に行う
function resizeCanvas() {
    const wrapper = document.getElementById('monitor-wrapper');
    canvas.width = wrapper.clientWidth || 600; // 取得できない場合のフォールバック
    canvas.height = wrapper.clientHeight || 220;
    lastY = canvas.height / 2;
}
window.addEventListener('resize', resizeCanvas);

// 心電図の初期化
function initECG(type) {
    ecgTime = 0;
    ecgX = 0;
    lastY = canvas.height / 2;
    ecgState = { type: type, nextBeat: 0.5, beatCount: 0 };
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// 波形の数学的生成ロジック
function getWaveValue(dt) {
    ecgTime += dt;
    let y = 0;
    
    if (ecgState.type === 'vf') {
        return (Math.sin(ecgTime * 15) * 0.4 + Math.sin(ecgTime * 27) * 0.3 + Math.sin(ecgTime * 7) * 0.3) * (0.6 + 0.4 * Math.sin(ecgTime * 2));
    }
    
    if (ecgState.type === 'vt') {
        return Math.sin(ecgTime * 15) * 0.7 + Math.sin(ecgTime * 5) * 0.3;
    }

    let timeSinceBeat = ecgTime - ecgState.nextBeat;
    
    if (ecgState.type === 'af') {
        y += Math.sin(ecgTime * 25) * 0.05 + Math.sin(ecgTime * 12) * 0.05;
    }
    
    if (timeSinceBeat >= 0 && timeSinceBeat < 0.6) {
        let phase = timeSinceBeat;
        let isPVC = (ecgState.type === 'pvc' && ecgState.beatCount % 4 === 3);
        
        if (isPVC) {
            if (phase < 0.15) y += Math.sin(phase * Math.PI / 0.15) * 0.8;
            else if (phase < 0.4) y -= Math.sin((phase - 0.15) * Math.PI / 0.25) * 0.4;
        } else {
            if (ecgState.type !== 'af' && phase < 0.1) y += Math.sin(phase * Math.PI / 0.1) * 0.1;
            if (phase > 0.15 && phase < 0.17) y -= 0.1;
            if (phase >= 0.17 && phase < 0.2) y += 0.9;
            if (phase >= 0.2 && phase < 0.23) y -= 0.3;
            if (phase > 0.35 && phase < 0.5) y += Math.sin((phase - 0.35) * Math.PI / 0.15) * 0.15;
        }
    }
    
    if (timeSinceBeat > 0.6) {
        ecgState.beatCount++;
        if (ecgState.type === 'af') {
            ecgState.nextBeat = ecgTime + 0.3 + Math.random() * 0.5;
        } else if (ecgState.type === 'pvc' && ecgState.beatCount % 4 === 3) {
            ecgState.nextBeat = ecgTime + 0.4;
        } else if (ecgState.type === 'pvc' && ecgState.beatCount % 4 === 0) {
            ecgState.nextBeat = ecgTime + 1.2;
        } else {
            ecgState.nextBeat = ecgTime + 0.8;
        }
    }
    return -y; 
}

// 描画ループ（リアルなスウィープ描画）
function drawLoop() {
    const speed = 2.5; 
    
    // 進行方向の少し先を黒く塗りつぶす（スウィープ効果）
    ctx.clearRect(ecgX, 0, speed + 15, canvas.height); 
    
    ctx.beginPath();
    ctx.moveTo(ecgX, lastY);
    
    let dt = 1/60;
    let val = getWaveValue(dt);
    let nextY = canvas.height / 2 + val * (canvas.height * 0.4); 
    
    ecgX += speed;
    
    // 右端に到達したかどうかの判定
    if (ecgX <= canvas.width) {
        ctx.lineTo(ecgX, nextY);
        ctx.strokeStyle = '#00FF00'; // 鮮やかな緑
        ctx.lineWidth = 2.5;
        ctx.lineJoin = 'round';
        ctx.stroke();
    } else {
        ecgX = 0; // 右端まで行ったら左端に戻る
    }
    
    lastY = nextY;
    animationId = requestAnimationFrame(drawLoop);
}

// 画面切り替え関数
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// ★修正点: 画面を表示してからキャンバスサイズを計算する
function startTraining() {
    showScreen('quiz-screen'); // 先に画面を表示！
    resizeCanvas();            // 表示されてからサイズを取得！
    nextQuestion();
}

function nextQuestion() {
    selectedAnswer = null;
    document.getElementById('btn-next-result').disabled = true;
    
    showScreen('quiz-screen');
    resizeCanvas(); // 念のためここでもリサイズ実行
    
    currentQuestion = ecgData[Math.floor(Math.random() * ecgData.length)];
    
    initECG(currentQuestion.id);
    if (animationId) cancelAnimationFrame(animationId);
    drawLoop();

    const container = document.getElementById('choices-container');
    container.innerHTML = '';
    
    let shuffled = [...ecgData].sort(() => Math.random() - 0.5);
    shuffled.forEach(item => {
        const btn = document.createElement('button');
        btn.textContent = item.name;
        btn.onclick = () => selectChoice(item.id, btn);
        container.appendChild(btn);
    });
}

function selectChoice(id, btnElement) {
    selectedAnswer = id;
    document.querySelectorAll('#choices-container button').forEach(b => b.classList.remove('selected'));
    btnElement.classList.add('selected');
    document.getElementById('btn-next-result').disabled = false;
}

function goToResult() {
    cancelAnimationFrame(animationId); 
    
    const isCorrect = (selectedAnswer === currentQuestion.id);
    const resultEl = document.getElementById('result-text');
    
    if (isCorrect) {
        resultEl.textContent = "✅ 正解！";
        resultEl.className = "result-title correct";
    } else {
        resultEl.textContent = "❌ 不正解...";
        resultEl.className = "result-title incorrect";
    }
    
    showScreen('result-screen');
}

function goToExplanation() {
    document.getElementById('exp-title').textContent = currentQuestion.name;
    document.getElementById('exp-action').innerHTML = `<strong>【緊急度】 ${currentQuestion.urgency}</strong><br>${currentQuestion.action}`;
    document.getElementById('exp-desc').textContent = currentQuestion.description;
    
    showScreen('explanation-screen');
}
</script>
</body>
</html>
