<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心電図判読トレーニング（高精度モニター版）</title>
<style>
    :root {
        --bg-color: #121212;
        --panel-bg: #1e1e1e;
        --monitor-bg: #001100;
        --primary-color: #4CAF50;
        --danger-color: #f44336;
        --text-color: #ffffff;
        --border-color: #333333;
    }

    body {
        font-family: 'Helvetica Neue', Arial, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    #app {
        width: 100%;
        max-width: 600px;
        background: var(--panel-bg);
        box-shadow: 0 8px 30px rgba(0,0,0,0.8);
        border-radius: 12px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        min-height: 85vh;
    }

    .screen {
        display: none;
        padding: 25px;
        flex-grow: 1;
        flex-direction: column;
        justify-content: center;
    }

    .screen.active {
        display: flex;
    }

    h1, h2, h3 {
        color: var(--primary-color);
        text-align: center;
        margin-top: 0;
    }

    /* =========================================
       高精度モニター背景（マス目のルールを適応）
       大きなマス(25px) と 小さなマス(5px) を描画
    ========================================= */
    #monitor-wrapper {
        width: 100%;
        height: 250px;
        background-color: var(--monitor-bg);
        background-image: 
            linear-gradient(rgba(0, 255, 0, 0.3) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 255, 0, 0.3) 1px, transparent 1px),
            linear-gradient(rgba(0, 255, 0, 0.08) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 255, 0, 0.08) 1px, transparent 1px);
        background-size: 25px 25px, 25px 25px, 5px 5px, 5px 5px;
        background-position: center center;
        border: 3px solid #222;
        border-radius: 8px;
        margin-bottom: 25px;
        position: relative;
        overflow: hidden;
    }

    /* キャンバスは背景を透明にして上に重ねる */
    canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 2;
    }

    /* ボタン群 */
    .btn-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 20px;
    }

    button {
        background: #2c2c2c;
        color: #fff;
        border: 2px solid var(--border-color);
        padding: 16px;
        font-size: 15px;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    button:hover {
        background: #3a3a3a;
    }

    button.selected {
        background: rgba(76, 175, 80, 0.2);
        border-color: var(--primary-color);
        color: var(--primary-color);
        font-weight: bold;
    }

    button.primary {
        background: var(--primary-color);
        color: #121212;
        border: none;
        font-size: 18px;
        font-weight: bold;
        padding: 18px;
        margin-top: auto;
        width: 100%;
    }

    button.primary:hover {
        background: #45a049;
    }

    button:disabled {
        background: #333;
        color: #666;
        cursor: not-allowed;
    }

    /* 解説ボックス */
    .info-box {
        background: #252525;
        border-left: 5px solid var(--primary-color);
        padding: 16px;
        margin-bottom: 16px;
        border-radius: 0 6px 6px 0;
    }

    .info-box.danger {
        border-left-color: var(--danger-color);
    }

    .info-label {
        font-size: 12px;
        color: #aaa;
        margin-bottom: 6px;
        font-weight: bold;
    }

    .info-text {
        font-size: 16px;
        line-height: 1.6;
        margin: 0;
    }

    .result-title {
        font-size: 36px;
        text-align: center;
        margin: 20px 0 40px 0;
        font-weight: bold;
    }
    
    .correct { color: var(--primary-color); }
    .incorrect { color: var(--danger-color); }

</style>
</head>
<body>

<div id="app">
    <div id="start-screen" class="screen active">
        <h1>心電図トレーニング</h1>
        <p style="text-align:center; color:#ccc; margin-bottom: 40px; line-height:1.6;">
            モニターに表示される波形を見て、<br>正しい心電図の種類を選択してください。
        </p>
        <button class="primary" onclick="startTraining()">訓練を開始する</button>
    </div>

    <div id="quiz-screen" class="screen">
        <div id="monitor-wrapper">
            <canvas id="ecg-canvas"></canvas>
        </div>
        <div class="btn-grid" id="choices-container"></div>
        <button id="btn-next-result" class="primary" onclick="goToResult()" disabled>回答する</button>
    </div>

    <div id="result-screen" class="screen">
        <div id="result-text" class="result-title"></div>
        <button class="primary" onclick="goToExplanation()">次へ（解説を見る）</button>
    </div>

    <div id="explanation-screen" class="screen">
        <h2 id="exp-title" style="margin-bottom: 20px;"></h2>
        
        <div class="info-box danger">
            <div class="info-label">🚨 緊急度・必要な処置</div>
            <p class="info-text" id="exp-action"></p>
        </div>

        <div class="info-box">
            <div class="info-label">📖 波形の詳細・特徴</div>
            <p class="info-text" id="exp-desc"></p>
        </div>

        <button class="primary" onclick="nextQuestion()" style="margin-top: 30px;">次の問題へ</button>
    </div>
</div>

<script>
// 問題データ
const ecgData = [
    { id: 'nsr', name: '正常洞調律', urgency: 'なし', action: '特になし', description: '洞結節で発生した規則正しい興奮が伝わる状態です。P波、QRS波、T波が一定のリズムで規則正しくあらわれます。' },
    { id: 'vf', name: '心室細動 (VF)', urgency: '高', action: 'ドクターコール・胸骨圧迫・早急な除細動', description: '心室筋が無秩序に興奮し、心拍出量はゼロとなる極めて危険な状態です。波形の大きさや形が一定しません。' },
    { id: 'vt', name: '心室頻拍 (VT)', urgency: '高', action: 'ドクターコール・胸骨圧迫・意識確認', description: '幅広いQRS波が連続します。血圧が低下し、ショック状態や突然死にいたる危険があります。' },
    { id: 'af', name: '心房細動 (AF)', urgency: '中', action: '12誘導心電図・症状の有無をチェック', description: 'P波が消失し、f波があらわれ、RR間隔が全く一定しない(絶対不整脈)のが特徴です。' },
    { id: 'pvc', name: '心室性期外収縮 (PVC)', urgency: '低〜中', action: 'バイタルチェック・症状の確認', description: '先行するP波を伴わない幅広いQRS波があらわれ、T波は逆向きになります。連発には注意が必要です。' }
];

let currentQuestion = null;
let selectedAnswer = null;

// キャンバスと描画の設定
const canvas = document.getElementById('ecg-canvas');
const ctx = canvas.getContext('2d');
let animationId;

// モニターのスウィープ描画用変数
let points = [];
let currentX = 0;
let ecgTime = 0;
let ecgState = {};

const SWEEP_SPEED = 2; // 1フレームに進むピクセル数
const GAP_WIDTH = 25;  // 進行方向の先に作る「消去の隙間」の幅（ピクセル）

function setupCanvas() {
    // 高解像度ディスプレイでも綺麗に描画するための設定
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    
    // 座標配列を初期化
    points = new Array(canvas.width).fill(null);
}
window.addEventListener('resize', setupCanvas);

function initECG(type) {
    ecgTime = 0;
    currentX = 0;
    points.fill(null);
    ecgState = { type: type, nextBeat: 0.5, beatCount: 0 };
}

// 波形の数学的アルゴリズム
function getWaveValue(dt) {
    ecgTime += dt;
    let y = 0;
    
    if (ecgState.type === 'vf') {
        return (Math.sin(ecgTime * 15) * 0.4 + Math.sin(ecgTime * 27) * 0.3 + Math.sin(ecgTime * 7) * 0.3) * (0.6 + 0.4 * Math.sin(ecgTime * 2));
    }
    if (ecgState.type === 'vt') {
        return Math.sin(ecgTime * 15) * 0.7 + Math.sin(ecgTime * 5) * 0.3;
    }

    let timeSinceBeat = ecgTime - ecgState.nextBeat;
    
    if (ecgState.type === 'af') {
        y += Math.sin(ecgTime * 25) * 0.05 + Math.sin(ecgTime * 12) * 0.05; // 基線の揺れ(f波)
    }
    
    if (timeSinceBeat >= 0 && timeSinceBeat < 0.6) {
        let phase = timeSinceBeat;
        let isPVC = (ecgState.type === 'pvc' && ecgState.beatCount % 4 === 3);
        
        if (isPVC) {
            if (phase < 0.15) y += Math.sin(phase * Math.PI / 0.15) * 0.8;
            else if (phase < 0.4) y -= Math.sin((phase - 0.15) * Math.PI / 0.25) * 0.4;
        } else {
            // P波
            if (ecgState.type !== 'af' && phase < 0.1) y += Math.sin(phase * Math.PI / 0.1) * 0.1;
            // QRS波
            if (phase > 0.15 && phase < 0.17) y -= 0.1;
            if (phase >= 0.17 && phase < 0.2) y += 0.9;
            if (phase >= 0.2 && phase < 0.23) y -= 0.3;
            // T波
            if (phase > 0.35 && phase < 0.5) y += Math.sin((phase - 0.35) * Math.PI / 0.15) * 0.15;
        }
    }
    
    // 次の心拍のタイミングを計算
    if (timeSinceBeat > 0.6) {
        ecgState.beatCount++;
        if (ecgState.type === 'af') {
            ecgState.nextBeat = ecgTime + 0.3 + Math.random() * 0.5; // 不規則
        } else if (ecgState.type === 'pvc' && ecgState.beatCount % 4 === 3) {
            ecgState.nextBeat = ecgTime + 0.4; // 早期
        } else if (ecgState.type === 'pvc' && ecgState.beatCount % 4 === 0) {
            ecgState.nextBeat = ecgTime + 1.2; // 代償性休止期
        } else {
            ecgState.nextBeat = ecgTime + 0.8; // 正常
        }
    }
    return -y; 
}

// マス目とスウィープ描画を両立させるリアルタイムレンダリング
function drawLoop() {
    let dt = 1 / 60;
    let val = getWaveValue(dt);
    
    // Y座標の計算（画面の高さに合わせてスケール）
    let y = (canvas.height / 2) + val * (canvas.height * 0.35);
    
    // 進行方向のポイントを更新
    for(let i = 0; i < SWEEP_SPEED; i++) {
        let px = (currentX + i) % canvas.width;
        points[px] = y;
    }
    
    currentX = (currentX + SWEEP_SPEED) % canvas.width;
    
    // キャンバスをクリア（透明になるため、後ろのCSSマス目が見える）
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    ctx.beginPath();
    ctx.strokeStyle = '#00FF00'; // 波形の色（明るい緑）
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    
    let isDrawing = false;
    
    // 横幅1ピクセルずつ線を引く
    for (let x = 0; x < canvas.width; x++) {
        // 現在の進行位置より少し先の「隙間(ギャップ)」は描画しない
        let distToCurrent = (x - currentX + canvas.width) % canvas.width;
        let inGap = distToCurrent > 0 && distToCurrent < GAP_WIDTH;
        
        if (inGap || points[x] === null) {
            isDrawing = false;
            continue;
        }
        
        if (!isDrawing) {
            ctx.moveTo(x, points[x]);
            isDrawing = true;
        } else {
            ctx.lineTo(x, points[x]);
        }
    }
    ctx.stroke();
    
    animationId = requestAnimationFrame(drawLoop);
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function startTraining() {
    showScreen('quiz-screen');
    setupCanvas(); 
    nextQuestion();
}

function nextQuestion() {
    selectedAnswer = null;
    document.getElementById('btn-next-result').disabled = true;
    
    showScreen('quiz-screen');
    
    currentQuestion = ecgData[Math.floor(Math.random() * ecgData.length)];
    
    if (animationId) cancelAnimationFrame(animationId);
    initECG(currentQuestion.id);
    drawLoop();

    const container = document.getElementById('choices-container');
    container.innerHTML = '';
    
    let shuffled = [...ecgData].sort(() => Math.random() - 0.5);
    shuffled.forEach(item => {
        const btn = document.createElement('button');
        btn.textContent = item.name;
        btn.onclick = () => selectChoice(item.id, btn);
        container.appendChild(btn);
    });
}

function selectChoice(id, btnElement) {
    selectedAnswer = id;
    document.querySelectorAll('#choices-container button').forEach(b => b.classList.remove('selected'));
    btnElement.classList.add('selected');
    document.getElementById('btn-next-result').disabled = false;
}

function goToResult() {
    if (animationId) cancelAnimationFrame(animationId); 
    
    const isCorrect = (selectedAnswer === currentQuestion.id);
    const resultEl = document.getElementById('result-text');
    
    if (isCorrect) {
        resultEl.textContent = "✅ 正解！";
        resultEl.className = "result-title correct";
    } else {
        resultEl.textContent = "❌ 不正解...";
        resultEl.className = "result-title incorrect";
    }
    
    showScreen('result-screen');
}

function goToExplanation() {
    document.getElementById('exp-title').textContent = currentQuestion.name;
    document.getElementById('exp-action').innerHTML = `<strong>【緊急度】 ${currentQuestion.urgency}</strong><br>${currentQuestion.action}`;
    document.getElementById('exp-desc').textContent = currentQuestion.description;
    
    showScreen('explanation-screen');
}
</script>
</body>
</html>
